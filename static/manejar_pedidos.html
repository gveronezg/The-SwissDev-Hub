<html>

<head>
    <title>Manejar Pedidos</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <h1>Manejar Pedidos</h1>
    <div id="editar_pedido">
        <label for="id">ID:</label>
        <input type="text" id="id" name="id" readonly><br><br>
        <div id="itens_do_pedido"></div>
        <label for="endereco">Endereço:</label>
        <input type="text" id="endereco" name="endereco"><br><br>
        <label for="contato">Contato:</label>
        <input type="text" id="contato" name="contato"><br><br>
        <label for="total">Total:</label>
        <input type="text" id="total" name="total" readonly><br><br>
        <button onclick="atualizarPedido()">Atualizar</button>
    </div><br>
    <div id="pedidos">
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Itens</th>
                    <th>Endereço</th>
                    <th>Contato</th>
                    <th>Total</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
    </div>
    <div id="paginacao">
        <button id="btn-voltar" onclick="paginaAnterior()" disabled>⬅️ Voltar</button>
        <span id="indicador-pagina">Página 1</span>
        <button id="btn-avancar" onclick="proximaPagina()">Avançar ➡️</button>
    </div>


    <script src="/static/manejar_pedidos.js"></script>
</body>

</html>
